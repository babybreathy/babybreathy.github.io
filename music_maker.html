<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐制作器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            color: #fff;
            position: relative;
        }

        .back-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            padding: 10px 25px;
            background: linear-gradient(45deg, #6c5ce7, #00cec9);
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.5);
        }

        h1 {
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
        }

        .mode-switch {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .mode-btn {
            padding: 15px 40px;
            font-size: 18px;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .mode-btn.record {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }

        .mode-btn.play {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        .mode-btn.active {
            transform: scale(1.1);
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.3);
        }

        .mode-btn:hover {
            transform: scale(1.05);
        }

        .panel {
            display: none;
            width: 100%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 30px;
            backdrop-filter: blur(10px);
        }

        .panel.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 钢琴键盘样式 */
        .piano-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            position: relative;
        }

        .piano {
            display: flex;
            position: relative;
        }

        .key {
            position: relative;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .key.white {
            width: 60px;
            height: 200px;
            background: linear-gradient(to bottom, #fff 0%, #e0e0e0 100%);
            border: 1px solid #ccc;
            border-radius: 0 0 8px 8px;
            margin: 0 2px;
            z-index: 1;
        }

        .key.white:active, .key.white.active {
            background: linear-gradient(to bottom, #e0e0e0 0%, #ccc 100%);
            transform: translateY(2px);
        }

        .key.black {
            width: 40px;
            height: 120px;
            background: linear-gradient(to bottom, #333 0%, #000 100%);
            border-radius: 0 0 5px 5px;
            position: absolute;
            z-index: 2;
            top: 0;
        }

        .key.black:active, .key.black.active {
            background: linear-gradient(to bottom, #222 0%, #111 100%);
        }

        .key-label {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #666;
            font-size: 12px;
            pointer-events: none;
        }

        .key.black .key-label {
            color: #fff;
            bottom: 5px;
        }

        /* 控制面板 */
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 30px;
            flex-wrap: wrap;
        }

        .control-btn {
            padding: 12px 25px;
            font-size: 16px;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
        }

        .btn-record {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }

        .btn-stop {
            background: linear-gradient(45deg, #666, #333);
            color: white;
        }

        .btn-play {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        .btn-save {
            background: linear-gradient(45deg, #3494e6, #ec6ead);
            color: white;
        }

        .btn-clear {
            background: linear-gradient(45deg, #f093fb, #f5576c);
            color: white;
        }

        .control-btn:hover {
            transform: scale(1.05);
        }

        .control-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            text-align: center;
            margin-top: 20px;
            font-size: 18px;
            padding: 15px;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
        }

        .status.recording {
            background: rgba(255, 65, 108, 0.3);
            animation: pulse 1s infinite;
        }

        .status.playing {
            background: rgba(56, 239, 125, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .recorded-notes {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            min-height: 60px;
            max-height: 150px;
            overflow-y: auto;
        }

        .recorded-notes h3 {
            margin-bottom: 10px;
            color: #38ef7d;
        }

        .note-display {
            display: inline-block;
            padding: 5px 10px;
            margin: 3px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            font-size: 14px;
        }

        /* 演奏模式样式 */
        .saved-songs {
            margin-top: 20px;
        }

        .saved-songs h3 {
            margin-bottom: 15px;
            color: #38ef7d;
        }

        .song-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .song-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .song-item:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .song-info {
            flex: 1;
        }

        .song-name {
            font-size: 18px;
            font-weight: bold;
        }

        .song-date {
            font-size: 12px;
            color: #aaa;
            margin-top: 5px;
        }

        .song-actions {
            display: flex;
            gap: 10px;
        }

        .song-btn {
            padding: 8px 20px;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .song-btn.play {
            background: linear-gradient(45deg, #11998e, #38ef7d);
            color: white;
        }

        .song-btn.delete {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
            color: white;
        }

        .song-btn:hover {
            transform: scale(1.05);
        }

        .empty-message {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }

        /* 保存对话框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal.show {
            display: flex;
        }

        .modal-content {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-content input {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            margin-bottom: 20px;
        }

        .modal-content input::placeholder {
            color: #aaa;
        }

        .modal-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        /* 音量控制 */
        .volume-control {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
        }

        .volume-control label {
            font-size: 16px;
        }

        .volume-slider {
            width: 200px;
            height: 8px;
            -webkit-appearance: none;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            outline: none;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: linear-gradient(45deg, #3494e6, #ec6ead);
            border-radius: 50%;
            cursor: pointer;
        }

        /* 音乐波动曲线 */
        .visualizer-container {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            overflow: hidden;
        }

        .visualizer-container h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #38ef7d;
        }

        #visualizer {
            width: 100%;
            height: 150px;
            background: linear-gradient(to bottom, #0a0a1a 0%, #1a1a3e 100%);
            border-radius: 10px;
            display: block;
        }

        .now-playing {
            text-align: center;
            margin-top: 15px;
            font-size: 16px;
            color: #38ef7d;
            min-height: 24px;
        }

        .note-indicator {
            display: flex;
            justify-content: center;
            gap: 5px;
            margin-top: 10px;
            flex-wrap: wrap;
            min-height: 30px;
        }

        .note-dot {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            transition: all 0.1s ease;
        }

        .note-dot.active {
            background: linear-gradient(45deg, #3494e6, #ec6ead);
            transform: scale(1.3);
            box-shadow: 0 0 15px rgba(56, 239, 125, 0.8);
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回首页</a>
    <h1>🎹 音乐制作器</h1>

    <div class="mode-switch">
        <button class="mode-btn record active" onclick="switchMode('record')">🎤 录制模式</button>
        <button class="mode-btn play" onclick="switchMode('play')">🎵 演奏模式</button>
    </div>

    <!-- 录制模式面板 -->
    <div id="recordPanel" class="panel active">
        <div class="piano-container">
            <div class="piano" id="piano"></div>
        </div>

        <div class="controls">
            <button class="control-btn btn-record" id="recordBtn" onclick="toggleRecording()">
                🔴 开始录制
            </button>
            <button class="control-btn btn-stop" id="stopBtn" onclick="stopRecording()" disabled>
                ⏹ 停止录制
            </button>
            <button class="control-btn btn-play" id="playBackBtn" onclick="playBack()" disabled>
                ▶ 回放
            </button>
            <button class="control-btn btn-save" id="saveBtn" onclick="showSaveModal()" disabled>
                💾 保存
            </button>
            <button class="control-btn btn-clear" onclick="clearRecording()">
                🗑 清除
            </button>
        </div>

        <div class="status" id="recordStatus">点击"开始录制"后，弹奏钢琴开始录制</div>

        <div class="recorded-notes" id="recordedNotes">
            <h3>录制的音符：</h3>
            <div id="notesDisplay">暂无录制内容</div>
        </div>

        <div class="volume-control">
            <label>🔊 音量：</label>
            <input type="range" class="volume-slider" id="volumeSlider" min="0" max="100" value="50" onchange="updateVolume()">
        </div>
    </div>

    <!-- 演奏模式面板 -->
    <div id="playPanel" class="panel">
        <div class="saved-songs">
            <h3>💾 已保存的音乐</h3>
            <div class="song-list" id="songList">
                <div class="empty-message">暂无保存的音乐，先去录制模式创作一首吧！</div>
            </div>
        </div>

        <div class="status" id="playStatus">选择一首音乐点击播放</div>

        <!-- 音乐波动曲线 -->
        <div class="visualizer-container">
            <h3>🎵 音乐可视化</h3>
            <canvas id="visualizer"></canvas>
            <div class="now-playing" id="nowPlaying"></div>
            <div class="note-indicator" id="noteIndicator"></div>
        </div>

        <div class="volume-control">
            <label>🔊 音量：</label>
            <input type="range" class="volume-slider" id="playVolumeSlider" min="0" max="100" value="50" onchange="updatePlayVolume()">
        </div>
    </div>

    <!-- 保存对话框 -->
    <div class="modal" id="saveModal">
        <div class="modal-content">
            <h3>💾 保存音乐</h3>
            <input type="text" id="songNameInput" placeholder="给您的音乐起个名字吧~" maxlength="30">
            <div class="modal-buttons">
                <button class="control-btn btn-stop" onclick="hideSaveModal()">取消</button>
                <button class="control-btn btn-save" onclick="saveSong()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // 音频上下文
        let audioContext = null;
        let volume = 0.5;
        let playVolume = 0.5;

        // 可视化相关
        let analyser = null;
        let dataArray = null;
        let animationId = null;
        let isPlaying = false;
        let currentNotes = [];
        let playTimeouts = [];

        // 音符频率 (Hz)
        const noteFrequencies = {
            'C4': 261.63, 'C#4': 277.18, 'D4': 293.66, 'D#4': 311.13,
            'E4': 329.63, 'F4': 349.23, 'F#4': 369.99, 'G4': 392.00,
            'G#4': 415.30, 'A4': 440.00, 'A#4': 466.16, 'B4': 493.88,
            'C5': 523.25, 'C#5': 554.37, 'D5': 587.33, 'D#5': 622.25,
            'E5': 659.25, 'F5': 698.46, 'F#5': 739.99, 'G5': 783.99,
            'G#5': 830.61, 'A5': 880.00, 'A#5': 932.33, 'B5': 987.77,
            'C6': 1046.50
        };

        // 钢琴键配置
        const pianoKeys = [
            { note: 'C4', type: 'white', key: 'a' },
            { note: 'C#4', type: 'black', key: 'w', offset: 40 },
            { note: 'D4', type: 'white', key: 's' },
            { note: 'D#4', type: 'black', key: 'e', offset: 102 },
            { note: 'E4', type: 'white', key: 'd' },
            { note: 'F4', type: 'white', key: 'f' },
            { note: 'F#4', type: 'black', key: 't', offset: 226 },
            { note: 'G4', type: 'white', key: 'g' },
            { note: 'G#4', type: 'black', key: 'y', offset: 288 },
            { note: 'A4', type: 'white', key: 'h' },
            { note: 'A#4', type: 'black', key: 'u', offset: 350 },
            { note: 'B4', type: 'white', key: 'j' },
            { note: 'C5', type: 'white', key: 'k' },
            { note: 'C#5', type: 'black', key: 'o', offset: 474 },
            { note: 'D5', type: 'white', key: 'l' },
            { note: 'D#5', type: 'black', key: 'p', offset: 536 },
            { note: 'E5', type: 'white', key: ';' },
            { note: 'F5', type: 'white', key: "'" },
            { note: 'F#5', type: 'black', key: ']', offset: 660 },
            { note: 'G5', type: 'white', key: '\\' }
        ];

        // 录制状态
        let isRecording = false;
        let recordedNotes = [];
        let recordingStartTime = 0;
        let currentMode = 'record';

        // 初始化音频上下文
        function initAudio() {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 初始化可视化器
        function initVisualizer() {
            if (!analyser) {
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
            }
        }

        // 绘制波形
        function drawWaveform() {
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            function animate() {
                if (!isPlaying) return;

                animationId = requestAnimationFrame(animate);

                analyser.getByteFrequencyData(dataArray);

                ctx.fillStyle = 'rgba(10, 10, 26, 0.2)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                const barWidth = (canvas.width / dataArray.length) * 2.5;
                let barHeight;
                let x = 0;

                for (let i = 0; i < dataArray.length; i++) {
                    barHeight = dataArray[i] * 0.5;

                    const gradient = ctx.createLinearGradient(0, canvas.height - barHeight, 0, canvas.height);
                    gradient.addColorStop(0, '#3494e6');
                    gradient.addColorStop(0.5, '#ec6ead');
                    gradient.addColorStop(1, '#38ef7d');

                    ctx.fillStyle = gradient;
                    ctx.fillRect(x, canvas.height - barHeight, barWidth, barHeight);

                    x += barWidth + 1;
                }
            }

            animate();
        }

        // 播放音符
        function playNote(note, duration = 0.5, forVisualizer = false) {
            initAudio();

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.connect(gainNode);

            if (forVisualizer && analyser) {
                gainNode.connect(analyser);
                analyser.connect(audioContext.destination);
            } else {
                gainNode.connect(audioContext.destination);
            }

            oscillator.frequency.value = noteFrequencies[note];
            oscillator.type = 'sine';

            const currentVolume = currentMode === 'record' ? volume : playVolume;
            gainNode.gain.setValueAtTime(currentVolume, audioContext.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + duration);

            oscillator.start(audioContext.currentTime);
            oscillator.stop(audioContext.currentTime + duration);
        }

        // 创建钢琴
        function createPiano() {
            const piano = document.getElementById('piano');
            let whiteKeyIndex = 0;

            pianoKeys.forEach((keyConfig, index) => {
                const key = document.createElement('div');
                key.className = `key ${keyConfig.type}`;
                key.dataset.note = keyConfig.note;
                key.dataset.key = keyConfig.key;

                if (keyConfig.type === 'black') {
                    key.style.left = keyConfig.offset + 'px';
                }

                const label = document.createElement('span');
                label.className = 'key-label';
                label.textContent = keyConfig.key.toUpperCase();
                key.appendChild(label);

                key.addEventListener('mousedown', () => handleKeyPress(keyConfig.note));
                key.addEventListener('mouseup', () => handleKeyRelease(key));
                key.addEventListener('mouseleave', () => handleKeyRelease(key));

                piano.appendChild(key);
            });
        }

        // 处理按键按下
        function handleKeyPress(note) {
            playNote(note);

            // 视觉反馈
            const keyElement = document.querySelector(`[data-note="${note}"]`);
            if (keyElement) {
                keyElement.classList.add('active');
                setTimeout(() => keyElement.classList.remove('active'), 100);
            }

            // 录制
            if (isRecording) {
                const timestamp = Date.now() - recordingStartTime;
                recordedNotes.push({ note, timestamp });
                updateNotesDisplay();
            }
        }

        function handleKeyRelease(key) {
            key.classList.remove('active');
        }

        // 键盘事件
        document.addEventListener('keydown', (e) => {
            if (e.repeat) return;

            const keyConfig = pianoKeys.find(k => k.key === e.key.toLowerCase());
            if (keyConfig) {
                handleKeyPress(keyConfig.note);
            }
        });

        // 切换录制状态
        function toggleRecording() {
            isRecording = true;
            recordedNotes = [];
            recordingStartTime = Date.now();

            document.getElementById('recordBtn').disabled = true;
            document.getElementById('stopBtn').disabled = false;
            document.getElementById('playBackBtn').disabled = true;
            document.getElementById('saveBtn').disabled = true;
            document.getElementById('recordStatus').textContent = '🔴 正在录制... 弹奏钢琴开始录制';
            document.getElementById('recordStatus').classList.add('recording');
            document.getElementById('notesDisplay').textContent = '暂无录制内容';
        }

        // 停止录制
        function stopRecording() {
            isRecording = false;

            document.getElementById('recordBtn').disabled = false;
            document.getElementById('stopBtn').disabled = true;
            document.getElementById('recordStatus').textContent = '录制完成！可以回放或保存';
            document.getElementById('recordStatus').classList.remove('recording');

            if (recordedNotes.length > 0) {
                document.getElementById('playBackBtn').disabled = false;
                document.getElementById('saveBtn').disabled = false;
            }
        }

        // 回放
        function playBack() {
            if (recordedNotes.length === 0) return;

            document.getElementById('recordStatus').textContent = '▶ 正在回放...';
            document.getElementById('recordStatus').classList.add('playing');

            let lastNoteTime = 0;
            const totalDuration = recordedNotes[recordedNotes.length - 1].timestamp + 500;

            recordedNotes.forEach((noteData, index) => {
                setTimeout(() => {
                    playNote(noteData.note);

                    // 视觉反馈
                    const keyElement = document.querySelector(`[data-note="${noteData.note}"]`);
                    if (keyElement) {
                        keyElement.classList.add('active');
                        setTimeout(() => keyElement.classList.remove('active'), 200);
                    }
                }, noteData.timestamp);
            });

            setTimeout(() => {
                document.getElementById('recordStatus').textContent = '回放完成！';
                document.getElementById('recordStatus').classList.remove('playing');
            }, totalDuration);
        }

        // 清除录制
        function clearRecording() {
            recordedNotes = [];
            updateNotesDisplay();
            document.getElementById('recordStatus').textContent = '已清除，点击"开始录制"重新开始';
            document.getElementById('playBackBtn').disabled = true;
            document.getElementById('saveBtn').disabled = true;
        }

        // 更新音符显示
        function updateNotesDisplay() {
            const display = document.getElementById('notesDisplay');
            if (recordedNotes.length === 0) {
                display.textContent = '暂无录制内容';
            } else {
                display.innerHTML = recordedNotes.map((n, i) =>
                    `<span class="note-display">${i + 1}. ${n.note} (${n.timestamp}ms)</span>`
                ).join('');
            }
        }

        // 显示保存对话框
        function showSaveModal() {
            if (recordedNotes.length === 0) return;
            document.getElementById('saveModal').classList.add('show');
            document.getElementById('songNameInput').value = '';
            document.getElementById('songNameInput').focus();
        }

        // 隐藏保存对话框
        function hideSaveModal() {
            document.getElementById('saveModal').classList.remove('show');
        }

        // 保存歌曲
        function saveSong() {
            const songName = document.getElementById('songNameInput').value.trim() || '未命名音乐';

            const song = {
                id: Date.now(),
                name: songName,
                notes: recordedNotes,
                createdAt: new Date().toLocaleString()
            };

            let savedSongs = JSON.parse(localStorage.getItem('musicMakerSongs') || '[]');
            savedSongs.push(song);
            localStorage.setItem('musicMakerSongs', JSON.stringify(savedSongs));

            hideSaveModal();
            document.getElementById('recordStatus').textContent = `已保存："${songName}"`;

            // 刷新歌曲列表
            if (currentMode === 'play') {
                loadSongList();
            }
        }

        // 切换模式
        function switchMode(mode) {
            currentMode = mode;

            document.querySelectorAll('.mode-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active'));

            if (mode === 'record') {
                document.querySelector('.mode-btn.record').classList.add('active');
                document.getElementById('recordPanel').classList.add('active');
            } else {
                document.querySelector('.mode-btn.play').classList.add('active');
                document.getElementById('playPanel').classList.add('active');
                // 初始化画布背景
                setTimeout(() => {
                    const canvas = document.getElementById('visualizer');
                    const ctx = canvas.getContext('2d');
                    canvas.width = canvas.offsetWidth;
                    canvas.height = canvas.offsetHeight;
                    ctx.fillStyle = 'rgba(10, 10, 26, 1)';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                }, 100);
                loadSongList();
            }
        }

        // 加载歌曲列表
        function loadSongList() {
            const songList = document.getElementById('songList');
            const savedSongs = JSON.parse(localStorage.getItem('musicMakerSongs') || '[]');

            if (savedSongs.length === 0) {
                songList.innerHTML = '<div class="empty-message">暂无保存的音乐，先去录制模式创作一首吧！</div>';
                return;
            }

            songList.innerHTML = savedSongs.map(song => `
                <div class="song-item">
                    <div class="song-info">
                        <div class="song-name">🎵 ${song.name}</div>
                        <div class="song-date">${song.createdAt} · ${song.notes.length} 个音符</div>
                    </div>
                    <div class="song-actions">
                        <button class="song-btn play" onclick="playSong(${song.id})">▶ 播放</button>
                        <button class="song-btn delete" onclick="deleteSong(${song.id})">🗑 删除</button>
                    </div>
                </div>
            `).join('');
        }

        // 播放歌曲
        function playSong(songId) {
            // 停止之前的播放
            stopPlaying();

            const savedSongs = JSON.parse(localStorage.getItem('musicMakerSongs') || '[]');
            const song = savedSongs.find(s => s.id === songId);

            if (!song) return;

            isPlaying = true;
            currentNotes = song.notes;

            document.getElementById('playStatus').textContent = `▶ 正在播放："${song.name}"`;
            document.getElementById('playStatus').classList.add('playing');
            document.getElementById('nowPlaying').textContent = `🎵 ${song.name}`;

            // 初始化可视化器
            initAudio();
            initVisualizer();
            drawWaveform();

            // 创建音符指示器
            createNoteIndicators(song.notes);

            // 播放每个音符
            song.notes.forEach((noteData, index) => {
                const timeout = setTimeout(() => {
                    playNote(noteData.note, 0.5, true);

                    // 钢琴键视觉反馈
                    const keyElement = document.querySelector(`[data-note="${noteData.note}"]`);
                    if (keyElement) {
                        keyElement.classList.add('active');
                        setTimeout(() => keyElement.classList.remove('active'), 200);
                    }

                    // 更新音符指示器
                    updateNoteIndicator(noteData.note);
                }, noteData.timestamp);
                playTimeouts.push(timeout);
            });

            const lastNoteTime = song.notes[song.notes.length - 1]?.timestamp + 1000;
            const endTimeout = setTimeout(() => {
                isPlaying = false;
                if (animationId) {
                    cancelAnimationFrame(animationId);
                    animationId = null;
                }
                // 清空画布
                const canvas = document.getElementById('visualizer');
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = 'rgba(10, 10, 26, 1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                document.getElementById('playStatus').textContent = '播放完成！';
                document.getElementById('playStatus').classList.remove('playing');
                document.getElementById('nowPlaying').textContent = '';
                clearNoteIndicators();
            }, lastNoteTime);
            playTimeouts.push(endTimeout);
        }

        // 停止播放
        function stopPlaying() {
            isPlaying = false;

            // 清除所有定时器
            playTimeouts.forEach(timeout => clearTimeout(timeout));
            playTimeouts = [];

            // 停止动画
            if (animationId) {
                cancelAnimationFrame(animationId);
                animationId = null;
            }

            // 清空画布
            const canvas = document.getElementById('visualizer');
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = 'rgba(10, 10, 26, 1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            document.getElementById('nowPlaying').textContent = '';
            clearNoteIndicators();
        }

        // 创建音符指示器
        function createNoteIndicators(notes) {
            const container = document.getElementById('noteIndicator');
            const uniqueNotes = [...new Set(notes.map(n => n.note))];
            container.innerHTML = uniqueNotes.map(note =>
                `<div class="note-dot" data-note="${note}" id="dot-${note}"></div>`
            ).join('');
        }

        // 更新音符指示器
        function updateNoteIndicator(note) {
            // 清除所有激活状态
            document.querySelectorAll('.note-dot').forEach(dot => dot.classList.remove('active'));

            // 激活当前音符
            const dot = document.getElementById(`dot-${note}`);
            if (dot) {
                dot.classList.add('active');
            }
        }

        // 清除音符指示器
        function clearNoteIndicators() {
            document.querySelectorAll('.note-dot').forEach(dot => dot.classList.remove('active'));
            const container = document.getElementById('noteIndicator');
            if (container) container.innerHTML = '';
        }

        // 删除歌曲
        function deleteSong(songId) {
            if (!confirm('确定要删除这首音乐吗？')) return;

            let savedSongs = JSON.parse(localStorage.getItem('musicMakerSongs') || '[]');
            savedSongs = savedSongs.filter(s => s.id !== songId);
            localStorage.setItem('musicMakerSongs', JSON.stringify(savedSongs));
            loadSongList();
        }

        // 更新音量
        function updateVolume() {
            volume = document.getElementById('volumeSlider').value / 100;
        }

        function updatePlayVolume() {
            playVolume = document.getElementById('playVolumeSlider').value / 100;
        }

        // 初始化
        createPiano();

        // 页面加载完成后初始化画布背景
        window.addEventListener('load', () => {
            const canvas = document.getElementById('visualizer');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                canvas.width = canvas.offsetWidth;
                canvas.height = canvas.offsetHeight;
                ctx.fillStyle = 'rgba(10, 10, 26, 1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }
        });
    </script>
</body>
</html>
