<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary-color: #6c5ce7;
            --secondary-color: #a29bfe;
            --accent-color: #00cec9;
            --bg-dark: #0c0c1e;
            --bg-card: #1a1a3e;
            --text-primary: #ffffff;
            --text-secondary: #b2b2b2;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 导航栏 */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
            background: rgba(12, 12, 30, 0.95);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-decoration: none;
        }

        .back-btn {
            padding: 10px 25px;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            border: none;
            border-radius: 25px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(108, 92, 231, 0.5);
        }

        /* 英雄标题 */
        .hero {
            padding: 150px 50px 80px;
            text-align: center;
            position: relative;
        }

        .hero h1 {
            font-size: 56px;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--primary-color), var(--secondary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            font-size: 20px;
            color: var(--text-secondary);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.8;
        }

        /* 相机滚动展示区 */
        .showcase-section {
            padding: 50px 0;
            position: relative;
        }

        .showcase-container {
            position: relative;
            max-width: 1400px;
            margin: 0 auto;
            overflow: hidden;
        }

        .showcase-track {
            display: flex;
            gap: 30px;
            padding: 20px 50px;
            transition: transform 0.5s ease;
        }

        .camera-card {
            min-width: 400px;
            background: var(--bg-card);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .camera-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 60px rgba(108, 92, 231, 0.3);
        }

        .camera-image {
            width: 100%;
            height: 280px;
            background: linear-gradient(135deg, #2a2a4a, #1a1a3e);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 100px;
            position: relative;
            overflow: hidden;
        }

        .camera-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .camera-card:hover .camera-image img {
            transform: scale(1.1);
        }

        .camera-info {
            padding: 25px;
        }

        .camera-brand {
            font-size: 14px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .camera-name {
            font-size: 24px;
            margin-bottom: 15px;
        }

        .camera-preview {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .spec-tag {
            padding: 6px 12px;
            background: rgba(108, 92, 231, 0.2);
            border-radius: 15px;
            font-size: 13px;
            color: var(--secondary-color);
        }

        /* 导航按钮 */
        .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover {
            background: var(--accent-color);
            transform: translateY(-50%) scale(1.1);
        }

        .nav-btn.prev {
            left: 10px;
        }

        .nav-btn.next {
            right: 10px;
        }

        /* 详情模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            padding: 50px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal.show {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 20px;
            max-width: 1000px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            animation: slideUp 0.3s ease;
        }

        @keyframes slideUp {
            from {
                transform: translateY(50px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--primary-color);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease;
        }

        .modal-close:hover {
            background: var(--accent-color);
            transform: rotate(90deg);
        }

        .modal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px;
        }

        .modal-image {
            background: linear-gradient(135deg, #2a2a4a, #1a1a3e);
            border-radius: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 150px;
            min-height: 400px;
            overflow: hidden;
        }

        .modal-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .modal-details h2 {
            font-size: 36px;
            margin-bottom: 10px;
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .modal-brand {
            font-size: 18px;
            color: var(--accent-color);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 30px;
        }

        .modal-description {
            color: var(--text-secondary);
            line-height: 1.8;
            margin-bottom: 30px;
        }

        .specs-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .spec-item {
            background: rgba(108, 92, 231, 0.1);
            padding: 20px;
            border-radius: 12px;
            border-left: 3px solid var(--primary-color);
        }

        .spec-label {
            font-size: 13px;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .spec-value {
            font-size: 18px;
            font-weight: bold;
            color: var(--text-primary);
        }

        /* 分类标签 */
        .categories {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 30px 50px;
            flex-wrap: wrap;
        }

        .category-btn {
            padding: 12px 25px;
            background: var(--bg-card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .category-btn:hover,
        .category-btn.active {
            background: linear-gradient(45deg, var(--primary-color), var(--accent-color));
            color: white;
            border-color: transparent;
        }

        /* 页脚 */
        footer {
            padding: 50px;
            text-align: center;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 50px;
        }

        footer p {
            color: var(--text-secondary);
        }

        /* 响应式 */
        @media (max-width: 768px) {
            nav {
                padding: 20px;
            }

            .hero {
                padding: 120px 20px 50px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .showcase-track {
                padding: 20px;
            }

            .camera-card {
                min-width: 300px;
            }

            .modal-body {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .modal-image {
                min-height: 250px;
                font-size: 80px;
            }

            .specs-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

        // 渲染相机卡片
        function renderCameras() {
            const track = document.getElementById('showcaseTrack');
            track.innerHTML = filteredCameras.map(camera => `
                <div class="camera-card" onclick="openModal(${camera.id})">
                    <div class="camera-image">
                        ${camera.emoji}
                    </div>
                    <div class="camera-info">
                        <div class="camera-brand">${camera.brand}</div>
                        <h3 class="camera-name">${camera.name}</h3>
                        <div class="camera-preview">
                            <span class="spec-tag">${Object.values(camera.specs)[0]}</span>
                            <span class="spec-tag">${camera.year}年</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        // 滚动展示
        function scrollShowcase(direction) {
            const track = document.getElementById('showcaseTrack');
            const cardWidth = 430; // 卡片宽度 + 间距
            const currentScroll = parseInt(track.style.transform.replace('translateX(', '').replace('px)', '') || 0);
            const maxScroll = track.scrollWidth - track.parentElement.clientWidth;

            let newScroll = currentScroll - (direction * cardWidth);
            newScroll = Math.max(-maxScroll, Math.min(0, newScroll));

            track.style.transform = `translateX(${newScroll}px)`;
        }

        // 打开模态框
        function openModal(cameraId) {
            const camera = cameras.find(c => c.id === cameraId);
            if (!camera) return;

            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="modal-image">
                    ${camera.emoji}
                </div>
                <div class="modal-details">
                    <div class="modal-brand">${camera.brand}</div>
                    <h2>${camera.name}</h2>
                    <p class="modal-description">${camera.description}</p>
                    <div class="specs-grid">
                        ${Object.entries(camera.specs).map(([key, value]) => `
                            <div class="spec-item">
                                <div class="spec-label">${key}</div>
                                <div class="spec-value">${value}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;

            const modal = document.getElementById('cameraModal');
            modal.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        // 关闭模态框
        function closeModal() {
            const modal = document.getElementById('cameraModal');
            modal.classList.remove('show');
            document.body.style.overflow = '';
        }

        document.getElementById('cameraModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {

        document.querySelectorAll('.category-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');

                const category = this.dataset.category;
                currentCategory = category;

                filteredCameras = category === 'all'
                    ? [...cameras]
                    : cameras.filter(c => c.category === category);

                renderCameras();

                // 重置滚动位置
                document.getElementById('showcaseTrack').style.transform = 'translateX(0)';
            });
        });

        // 初始化
        renderCameras();
    </script>
</body>
</html>
