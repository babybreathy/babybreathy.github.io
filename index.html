<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>相机博物馆</title>
    <!-- 引入Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 引入Font Awesome图标 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- 自定义配置 -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#1a202c',
                        secondary: '#4a5568',
                        accent: '#3182ce',
                        light: '#f7fafc',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer utilities {
            /* 自定义工具类 */
            .scroll-container {
                overflow: hidden;
                position: relative;
            }
            .scroll-content {
                display: flex;
                animation: scroll 30s linear infinite;
            }
            .scroll-content:hover {
                animation-play-state: paused;
            }
            @keyframes scroll {
                0% {
                    transform: translateX(0);
                }
                100% {
                    transform: translateX(-50%);
                }
            }
            .brand-active {
                @apply bg-accent text-white border-accent;
            }
            .card-hover {
                @apply transition-all duration-300 hover:shadow-xl hover:-translate-y-1;
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans text-primary min-h-screen">
    <!-- 页面头部 -->
    <header class="bg-white shadow-sm sticky top-0 z-50">
        <div class="container mx-auto px-4 py-6">
            <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-center mb-6">相机博物馆</h1>
            
            <!-- 品牌选项栏 -->
            <div class="flex flex-wrap justify-center gap-2 md:gap-4 mb-2">
                <button class="brand-btn brand-active px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200" data-brand="sony">
                    索尼
                </button>
                <button class="brand-btn px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200 hover:bg-gray-100" data-brand="canon">
                    佳能
                </button>
                <button class="brand-btn px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200 hover:bg-gray-100" data-brand="nikon">
                    尼康
                </button>
                <button class="brand-btn px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200 hover:bg-gray-100" data-brand="panasonic">
                    松下
                </button>
                <button class="brand-btn px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200 hover:bg-gray-100" data-brand="olympus">
                    奥林巴斯
                </button>
                <button class="brand-btn px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200 hover:bg-gray-100" data-brand="leica">
                    徕卡
                </button>
                <button class="brand-btn px-4 py-2 rounded-full border border-gray-300 text-sm md:text-base transition-all duration-200 hover:bg-gray-100" data-brand="fujifilm">
                    富士
                </button>
            </div>
        </div>
    </header>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 py-8">
        <!-- 品牌标题 -->
        <div class="text-center mb-8">
            <h2 class="brand-title text-2xl md:text-3xl font-semibold">索尼 主流机型</h2>
            <p class="text-secondary mt-2">点击机型图片查看详细参数</p>
        </div>

        <!-- 横向滚动容器 -->
        <div class="scroll-container h-[400px] md:h-[450px] mb-12">
            <div class="scroll-content" id="cameraScroll">
                <!-- 内容由JS动态生成 -->
            </div>
        </div>
    </main>

    <!-- 详情弹窗 -->
    <div id="detailModal" class="fixed inset-0 bg-black/70 flex items-center justify-center z-50 hidden">
        <div class="bg-white rounded-xl w-[90%] max-w-4xl max-h-[80vh] overflow-auto p-6 relative">
            <button id="closeModal" class="absolute top-4 right-4 text-gray-500 hover:text-gray-800 transition-colors">
                <i class="fa-solid fa-xmark text-xl"></i>
            </button>
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="camera-detail-img">
                    <img src="" alt="" class="w-full h-auto rounded-lg shadow-md">
                </div>
                <div class="camera-detail-info">
                    <h3 class="text-2xl font-bold mb-2 camera-name"></h3>
                    <p class="text-accent font-medium mb-4 camera-brand"></p>
                    
                    <div class="space-y-3">
                        <div>
                            <span class="text-secondary font-medium">发售时间：</span>
                            <span class="camera-release"></span>
                        </div>
                        <div>
                            <span class="text-secondary font-medium">传感器：</span>
                            <span class="camera-sensor"></span>
                        </div>
                        <div>
                            <span class="text-secondary font-medium">有效像素：</span>
                            <span class="camera-pixels"></span>
                        </div>
                        <div>
                            <span class="text-secondary font-medium">视频规格：</span>
                            <span class="camera-video"></span>
                        </div>
                        <div>
                            <span class="text-secondary font-medium">连拍速度：</span>
                            <span class="camera-shooting"></span>
                        </div>
                        <div>
                            <span class="text-secondary font-medium">电池续航：</span>
                            <span class="camera-battery"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 页脚 -->
    <footer class="bg-primary text-white py-6">
        <div class="container mx-auto px-4 text-center">
            <p>邓璇&相机博物馆 &copy; 2026 版权所有</p>
        </div>
    </footer>

        // 元素获取
        const brandBtns = document.querySelectorAll('.brand-btn');
        const brandTitle = document.querySelector('.brand-title');
        const cameraScroll = document.getElementById('cameraScroll');
        const detailModal = document.getElementById('detailModal');
        const closeModal = document.getElementById('closeModal');
        
        // 初始化 - 默认加载索尼数据
        renderCameraList('sony');

        // 品牌切换事件
        brandBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                // 移除所有选中态
                brandBtns.forEach(b => b.classList.remove('brand-active'));
                // 添加当前选中态
                this.classList.add('brand-active');
                
                // 获取品牌标识
                const brand = this.dataset.brand;
                // 更新标题
                brandTitle.textContent = `${cameraData[brand].name} 主流机型`;
                // 渲染对应品牌相机列表
                renderCameraList(brand);
            });
        });

        // 关闭弹窗事件
        closeModal.addEventListener('click', () => {
            detailModal.classList.add('hidden');
        });

        // 点击弹窗外区域关闭
        detailModal.addEventListener('click', function(e) {
            if (e.target === this) {
                this.classList.add('hidden');
            }
        });

        // 渲染相机列表
        function renderCameraList(brand) {
            const brandData = cameraData[brand];
            let html = '';
            
            // 生成两份相同内容，实现无缝滚动
            for (let i = 0; i < 2; i++) {
                brandData.models.forEach(model => {
                    html += `
                        <div class="min-w-[300px] md:min-w-[350px] p-4">
                            <div class="bg-white rounded-lg shadow-md overflow-hidden card-hover cursor-pointer" data-model-id="${model.id}" data-brand="${brand}">
                                <img src="${model.img}" alt="${model.name}" class="w-full h-[200px] object-cover">
                                <div class="p-4">
                                    <h3 class="font-bold text-lg mb-1">${model.name}</h3>
                                    <p class="text-secondary text-sm">${brandData.name}</p>
                                </div>
                            </div>
                        </div>
                    `;
                });
            }
            
            // 更新滚动内容
            cameraScroll.innerHTML = html;
            
            // 为每个相机卡片添加点击事件
            document.querySelectorAll('[data-model-id]').forEach(card => {
                card.addEventListener('click', function() {
                    const brand = this.dataset.brand;
                    const modelId = this.dataset.modelId;
                    // 查找对应机型数据
                    const model = cameraData[brand].models.find(m => m.id === modelId);
                    // 填充弹窗数据
                    fillModalData(model, brand);
                    // 显示弹窗
                    detailModal.classList.remove('hidden');
                });
            });
        }

        // 填充弹窗数据
        function fillModalData(model, brand) {
            document.querySelector('.camera-detail-img img').src = model.img;
            document.querySelector('.camera-detail-img img').alt = model.name;
            document.querySelector('.camera-name').textContent = model.name;
            document.querySelector('.camera-brand').textContent = cameraData[brand].name;
            document.querySelector('.camera-release').textContent = model.release;
            document.querySelector('.camera-sensor').textContent = model.sensor;
            document.querySelector('.camera-pixels').textContent = model.pixels;
            document.querySelector('.camera-video').textContent = model.video;
            document.querySelector('.camera-shooting').textContent = model.shooting;
            document.querySelector('.camera-battery').textContent = model.battery;
        }

        // 键盘ESC关闭弹窗
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                detailModal.classList.add('hidden');
            }
        });
    </script>
</body>
</html>
